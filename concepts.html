<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#44060;&#45392;&#51221;&#47532; | &#54617;&#44368;&#49324;&#54924;&#48373;&#51648;&#47200;</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand">&#54617;&#44368;&#49324;&#54924;&#48373;&#51648;&#47200;</a>
    <nav><a href="quiz.html">&#47928;&#51228;&#54400;&#51060;</a><a href="concepts.html" aria-current="page">&#44060;&#45392;&#51221;&#47532;</a><a href="mindmap.html">&#47560;&#51064;&#46300;&#47605;</a></nav>
  </header>
  <main class="content-shell">
    <section class="page-heading">
      <p class="eyebrow">Concept Review</p>
      <h1>&#44053;&#51032;&#48324; &#44060;&#45392;&#51221;&#47532;</h1>
      <input id="search" class="search" type="search" placeholder="&#53412;&#50892;&#46300; &#44160;&#49353;" aria-label="concept search">
    </section>
    <div class="lecture-tabs" id="lecture-tabs"></div>
    <section class="concept-list" id="concept-list"></section>
  </main>
  <script src="data.js"></script>
  <script>
    const tabs = document.getElementById('lecture-tabs');
    const list = document.getElementById('concept-list');
    const search = document.getElementById('search');
    let active = lectures[0]?.id || 1;
    const labelOf = (lecture) => lecture.label || `${lecture.id}\uac15`;
    function plainText(value) {
      return String(value || '').replace(/<[^>]+>/g, ' ');
    }
    function keywordsFor(sub) {
      const source = plainText([sub.title, sub.paragraph || '', ...(sub.points || []).slice(0, 1)].join(' '));
      const words = source.split(/[\s,./()]+/).map((word) => word.replace(/["'.,!]/g, '')).filter((word) => word.length >= 2);
      return [...new Set(words)].slice(0, 3);
    }
    function renderTabs() {
      tabs.innerHTML = lectures.map((lecture) => `<button type="button" class="tab ${lecture.id === active ? 'is-active' : ''}" data-id="${lecture.id}">${labelOf(lecture)}</button>`).join('');
    }
    function renderList() {
      const query = search.value.trim().toLowerCase();
      const lecture = lectures.find((item) => item.id === active);
      if (!lecture) return;
      const sections = lecture.sections.map((section) => {
        const subtopics = section.subtopics.filter((sub) => !query || plainText([section.title, sub.title, sub.paragraph || '', ...(sub.points || [])].join(' ')).toLowerCase().includes(query));
        if (!subtopics.length) return '';
        return `<article class="concept-section"><h2>${section.title}</h2>${subtopics.map((sub) => {
          const keywords = keywordsFor(sub).map((word) => `<span>${word}</span>`).join('');
          const paragraph = sub.paragraph || (sub.points || []).join(' ');
          return `<details class="concept-card"><summary><span><strong>${sub.id}. ${sub.title}</strong><span class="keyword-row">${keywords}</span></span><em class="details-toggle"><span class="show-closed">\ud3bc\uce58\uae30</span><span class="show-open">\uc811\uae30</span></em></summary><p class="concept-paragraph">${paragraph}</p></details>`;
        }).join('')}</article>`;
      }).join('');
      list.innerHTML = sections || '<p class="empty">\uac80\uc0c9 \uacb0\uacfc\uac00 \uc5c6\uc2b5\ub2c8\ub2e4.</p>';
    }
    tabs.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-id]');
      if (!button) return;
      active = Number(button.dataset.id);
      renderTabs();
      renderList();
    });
    search.addEventListener('input', renderList);
    renderTabs();
    renderList();
  </script>
</body>
</html>
