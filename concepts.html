<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Concepts</title><link rel="stylesheet" href="style.css"></head><body><header class="topbar"><a href="index.html" class="brand">&#54617;&#44368;&#49324;&#54924;&#48373;&#51648;&#47200;</a><nav><a href="quiz.html">&#47928;&#51228;&#54400;&#51060;</a><a href="concepts.html" aria-current="page">&#44060;&#45392;&#51221;&#47532;</a></nav></header><main class="content-shell"><section class="page-heading"><p class="eyebrow">Concept Review</p><h1>&#44053;&#51032;&#48324; &#44060;&#45392;&#51221;&#47532;</h1><input id="search" class="search" type="search" placeholder="Search"></section><div class="lecture-tabs" id="lecture-tabs"></div><section class="concept-list" id="concept-list"></section></main><script src="data.js"></script><script>const tabs=document.getElementById('lecture-tabs'),list=document.getElementById('concept-list'),search=document.getElementById('search');let active=lectures[0]?.id||1;function renderTabs(){tabs.innerHTML=lectures.map(l=>`<button type="button" class="tab ${l.id===active?'is-active':''}" data-id="${l.id}">${l.id}?</button>`).join('')}function renderList(){const q=search.value.trim().toLowerCase(),lec=lectures.find(x=>x.id===active);if(!lec)return;const html=lec.sections.map(s=>{const subs=s.subtopics.filter(sub=>!q||[s.title,sub.title,...sub.points].join(' ').toLowerCase().includes(q));if(!subs.length)return'';return`<article class="concept-section"><h2>${s.title}</h2>${subs.map(sub=>`<div class="concept-card"><h3>${sub.id}. ${sub.title}</h3><ul>${sub.points.map(p=>`<li>${p}</li>`).join('')}</ul></div>`).join('')}</article>`}).join('');list.innerHTML=html||'<p class="empty">No results.</p>'}tabs.addEventListener('click',e=>{const b=e.target.closest('button[data-id]');if(!b)return;active=Number(b.dataset.id);renderTabs();renderList()});search.addEventListener('input',renderList);renderTabs();renderList();</script></body></html>
