<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#47928;&#51228;&#54400;&#51060; | &#54617;&#44368;&#49324;&#54924;&#48373;&#51648;&#47200;</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="brand">&#54617;&#44368;&#49324;&#54924;&#48373;&#51648;&#47200;</a>
    <nav><a href="quiz.html" aria-current="page">&#47928;&#51228;&#54400;&#51060;</a><a href="concepts.html">&#44060;&#45392;&#51221;&#47532;</a><a href="mindmap.html">&#47560;&#51064;&#46300;&#47605;</a></nav>
  </header>
  <main class="content-shell quiz-shell">
    <section class="page-heading compact"><p class="eyebrow">Practice</p><h1>&#44592;&#47568;&#44256;&#49324; &#45824;&#48708; &#47928;&#51228;&#54400;&#51060;</h1></section>
    <section class="quiz-tools">
      <label>&#44053;&#51032; <select id="lecture-filter"><option value="all">&#51204;&#52404;</option></select></label>
      <label>&#49692;&#49436; <select id="mode"><option value="normal">&#44592;&#48376;</option><option value="shuffle">&#49438;&#44592;</option><option value="wrong">&#50724;&#45813;&#47564;</option></select></label>
      <button type="button" id="reset-progress">&#51652;&#46020; &#52488;&#44592;&#54868;</button>
    </section>
    <section class="quiz-card" id="quiz-card"></section>
  </main>
  <script src="data.js"></script>
  <script>
    const filter = document.getElementById('lecture-filter');
    const mode = document.getElementById('mode');
    const card = document.getElementById('quiz-card');
    const reset = document.getElementById('reset-progress');
    const labelById = new Map(lectures.map((lecture) => [lecture.id, lecture.label || `${lecture.id}\uac15`]));
    let index = 0;
    let order = [];
    let progress = JSON.parse(localStorage.getItem('schoolQuizProgress') || '{"solvedQuestions":[],"wrongQuestions":[]}');
    const save = () => localStorage.setItem('schoolQuizProgress', JSON.stringify(progress));
    lectures.forEach((lecture) => filter.insertAdjacentHTML('beforeend', `<option value="${lecture.id}">${lecture.label || `${lecture.id}\uac15`} ${lecture.title}</option>`));
    function shuffled(items) { return [...items].sort((a, b) => ((a.id * 37) % 101) - ((b.id * 37) % 101)); }
    function buildOrder() {
      let items = questions.filter((question) => filter.value === 'all' || String(question.lecture) === filter.value);
      if (mode.value === 'wrong') {
        const wrong = new Set(progress.wrongQuestions || []);
        items = items.filter((question) => wrong.has(question.id));
      }
      order = mode.value === 'shuffle' ? shuffled(items) : items;
      index = 0;
      renderQuestion();
    }
    function renderQuestion() {
      if (!order.length) { card.innerHTML = '<p class="empty">\ud45c\uc2dc\ud560 \ubb38\uc81c\uac00 \uc5c6\uc2b5\ub2c8\ub2e4.</p>'; return; }
      const question = order[index];
      const solved = new Set(progress.solvedQuestions || []);
      const lectureLabel = question.lectureLabel || labelById.get(question.lecture) || `${question.lecture}\uac15`;
      card.innerHTML = `<div class="quiz-meta"><span>${lectureLabel}</span><span>${question.source}</span><span>${index + 1} / ${order.length}</span></div><h2>${question.question}</h2><div class="options">${question.options.map((option, choiceIndex) => `<button type="button" data-choice="${choiceIndex}">${option}</button>`).join('')}</div><div class="feedback" id="feedback"></div><div class="quiz-actions"><button type="button" id="prev">\uc774\uc804</button><button type="button" id="next">\ub2e4\uc74c</button></div><p class="solved-state">${solved.has(question.id) ? '\ud480\uc774 \uc644\ub8cc' : '\ubbf8\ud480\uc774'}</p>`;
    }
    card.addEventListener('click', (event) => {
      const choice = event.target.closest('button[data-choice]');
      if (choice) {
        const question = order[index];
        const picked = Number(choice.dataset.choice);
        const buttons = [...card.querySelectorAll('button[data-choice]')];
        buttons.forEach((button) => button.disabled = true);
        buttons[question.answer].classList.add('is-correct');
        if (picked !== question.answer) choice.classList.add('is-wrong');
        progress.solvedQuestions = [...new Set([...(progress.solvedQuestions || []), question.id])];
        const wrong = new Set(progress.wrongQuestions || []);
        if (picked === question.answer) wrong.delete(question.id); else wrong.add(question.id);
        progress.wrongQuestions = [...wrong];
        save();
        document.getElementById('feedback').innerHTML = `<strong>${picked === question.answer ? '\uc815\ub2f5\uc785\ub2c8\ub2e4.' : '\ub2e4\uc2dc \ud655\uc778\ud574\ubd05\uc2dc\ub2e4.'}</strong><p>${question.explanation}</p>`;
      }
      if (event.target.id === 'next') { index = (index + 1) % order.length; renderQuestion(); }
      if (event.target.id === 'prev') { index = (index - 1 + order.length) % order.length; renderQuestion(); }
    });
    reset.addEventListener('click', () => { progress = { solvedQuestions: [], wrongQuestions: [] }; save(); buildOrder(); });
    filter.addEventListener('change', buildOrder);
    mode.addEventListener('change', buildOrder);
    buildOrder();
  </script>
</body>
</html>
